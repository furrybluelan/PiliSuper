name: Build

on:
  # 底下那托参数在pr触发的时候是空值，以前没炸是因为硬编码。小心!
  workflow_call:
    secrets:
      TELEGRAM_BOT_TOKEN:
        description: "Telegram Bot API token（未配置则跳过通知）"
        required: false
      TELEGRAM_CHAT_ID:
        description: "Telegram chat/channel ID（未配置则跳过通知）"
        required: false
      TELEGRAM_TOPIC_ID:
        description: "Telegram forum topic ID（可选）"
        required: false
    inputs:
      source_sha:
        description: "要构建的 commit SHA（空则使用触发时的 github.sha）"
        required: false
        type: string
        default: ""
      sign_android:
        description: "使用传入的 Android 签名凭据"
        required: false
        type: boolean
        default: false
      tag:
        required: false
        type: string
        default: ""
      pkg_id:
        required: false
        type: string
        default: "com.pili.super"
      app_name:
        required: false
        type: string
        default: "PiliSuper"
      build_android_release:
        required: false
        type: boolean
        default: true
      build_android_dev:
        required: false
        type: boolean
        default: true
      build_ios:
        required: false
        type: boolean
        default: true
      build_macos:
        required: false
        type: boolean
        default: true
      build_windows_portable:
        required: false
        type: boolean
        default: true
      build_windows_installer:
        required: false
        type: boolean
        default: true
      build_linux_tar_gz:
        required: false
        type: boolean
        default: true
      build_linux_deb:
        required: false
        type: boolean
        default: true
      build_linux_rpm:
        required: false
        type: boolean
        default: true
      build_linux_appimage:
        required: false
        type: boolean
        default: true
      build_linux_arch:
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      source_sha:
        description: "要构建的 commit SHA（留空则使用当前分支 HEAD）"
        required: false
        default: ""
        type: string
      sign_android:
        description: "使用配置的 Android 签名凭据"
        default: false
        type: boolean
      tag:
        description: "Release tag（留空则只构建不发布）"
        required: false
        default: ""
        type: string
      pkg_id:
        description: "包名（留空则使用默认值）"
        required: false
        default: "com.pili.super"
        type: string
      app_name:
        description: "应用名（留空则使用默认值）"
        required: false
        default: "PiliSuper"
        type: string
      build_android_release:
        description: "Android：正式 APK（全部 ABI）"
        default: true
        type: boolean
      build_android_dev:
        description: "Android：开发版 APK（全部 ABI）"
        default: true
        type: boolean
      build_ios:
        description: "iOS：未签名 IPA"
        default: true
        type: boolean
      build_macos:
        description: "macOS：DMG"
        default: true
        type: boolean
      build_windows_portable:
        description: "Windows：便携版 ZIP"
        default: true
        type: boolean
      build_windows_installer:
        description: "Windows：安装程序 EXE"
        default: true
        type: boolean
      build_linux_tar_gz:
        description: "Linux：tar.gz"
        default: true
        type: boolean
      build_linux_deb:
        description: "Linux：Debian DEB"
        default: true
        type: boolean
      build_linux_rpm:
        description: "Linux：RPM"
        default: true
        type: boolean
      build_linux_appimage:
        description: "Linux：AppImage"
        default: true
        type: boolean
      build_linux_arch:
        description: "Linux：Arch PKG（依赖 Linux bundle）"
        default: true
        type: boolean

# ─────────────────────────────────────────────────────────────────

jobs:

  # ───────────── Android ─────────────
  android:
    name: Android
    if: ${{ inputs.build_android_release == true || inputs.build_android_dev == true }}
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Add Rename CLI tool
        run: |
            dart pub global activate rename

      - name: Rename project
        run: |
          NAME_ARGS=()
          if [[ -n "${{ inputs.app_name}}" ]]; then
            NAME_ARGS+=(--app-name "${{ inputs.app_name}}")
          fi
          if [[ -n "${{ inputs.pkg_id }}" ]]; then
            NAME_ARGS+=(--pkg-id "${{ inputs.pkg_id }}")
          fi
          python3 pybuilds/rename.py "${NAME_ARGS[@]}"

      - name: Generate release metadata
        run: |
          python3 pybuilds/prebuild.py --platform android
          echo "VERSION=$(sed -n 's/^version: //p' pubspec.yaml)" >> "$GITHUB_ENV"

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Apply Patches
        run: python3 pybuilds/patch.py android

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Build release APKs
        if: ${{ inputs.build_android_release == true }}
        env:
          KEYSTORE_B64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          KEY_ALIAS:    ${{ secrets.KEY_ALIAS }}
          KEY_PASS:     ${{ secrets.KEY_PASSWORD }}
          STORE_PASS:   ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          SIGN_ARGS=()
          if [[ "${{ inputs.sign_android }}" == "true" || ( "${{ github.event_name }}" == "workflow_dispatch" && -n "$KEYSTORE_B64" ) ]]; then
            if [[ -z "$KEYSTORE_B64" || -z "$KEY_ALIAS" || -z "$KEY_PASS" ]]; then
              echo "Android signing was requested but signing secrets are incomplete" >&2
              exit 1
            fi
            SIGN_ARGS=(
              --keystore-base64 "$KEYSTORE_B64"
              --key-alias "$KEY_ALIAS"
              --key-password "$KEY_PASS"
              --store-password "$STORE_PASS"
              --clean-keys
            )
          fi
          python3 pybuilds/build_android.py --version "$VERSION" --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" --output dist "${SIGN_ARGS[@]}"

      - name: Build Dev
        env:
          KEYSTORE_B64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          KEY_ALIAS:    ${{ secrets.KEY_ALIAS }}
          KEY_PASS:     ${{ secrets.KEY_PASSWORD }}
          STORE_PASS:   ${{ secrets.KEYSTORE_PASSWORD }}
        if: ${{ inputs.build_android_dev == true }}
        run: |
          SIGN_ARGS=()
          if [[ "${{ inputs.sign_android }}" == "true" || ( "${{ github.event_name }}" == "workflow_dispatch" && -n "$KEYSTORE_B64" ) ]]; then
            if [[ -z "$KEYSTORE_B64" || -z "$KEY_ALIAS" || -z "$KEY_PASS" ]]; then
              echo "Android signing was requested but signing secrets are incomplete" >&2
              exit 1
            fi
            SIGN_ARGS+=(
              --keystore-base64 "$KEYSTORE_B64"
              --key-alias       "$KEY_ALIAS"
              --key-password    "$KEY_PASS"
              --store-password  "$STORE_PASS"
              --clean-keys
            )
          fi

          VERSION=$(sed -n 's/^version: //p' pubspec.yaml)
          python3 pybuilds/build_android.py --version "$VERSION" --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" --output dist --dev "${SIGN_ARGS[@]}"

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name:     ${{ inputs.tag }}
          target_commitish: ${{ inputs.source_sha || github.sha }}
          files: dist/${{ inputs.app_name || 'PiliSuper' }}_android_*.apk

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_android_release == true }}
        with:
          name: Android_release_arm64-v8a
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_android_*_arm64-v8a.apk
          archive: false

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_android_release == true }}
        with:
          name: Android_release_armeabi-v7a
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_android_*_armeabi-v7a.apk
          archive: false

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_android_release == true }}
        with:
          name: Android_release_x86_64
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_android_*_x86_64.apk
          archive: false

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_android_dev == true }}
        with:
          name: Android_dev_arm64-v8a
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_android_*_arm64-v8a_dev.apk
          archive: false

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_android_dev == true }}
        with:
          name: Android_dev_armeabi-v7a
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_android_*_armeabi-v7a_dev.apk
          archive: false

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_android_dev == true }}
        with:
          name: Android_dev_x86_64
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_android_*_x86_64_dev.apk
          archive: false

  # ───────────── iOS ─────────────
  ios:
    name: iOS
    if: ${{ inputs.build_ios == true }}
    runs-on: macos-26
    permissions: write-all
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      
      - name: Add Rename CLI tool
        run: |
            dart pub global activate rename

      - name: Rename project
        run: |
          NAME_ARGS=()
          if [[ -n "${{ inputs.app_name}}" ]]; then
            NAME_ARGS+=(--app-name "${{ inputs.app_name}}")
          fi
          if [[ -n "${{ inputs.pkg_id }}" ]]; then
            NAME_ARGS+=(--pkg-id "${{ inputs.pkg_id }}")
          fi
          python3 pybuilds/rename.py "${NAME_ARGS[@]}"

      - name: Generate release metadata
        run: |
          python3 pybuilds/prebuild.py --platform ios
          echo "VERSION=$(sed -n 's/^version: //p' pubspec.yaml)" >> "$GITHUB_ENV"

      - name: Apply Patches
        run: python3 pybuilds/patch.py ios

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Build IPA
        run: python3 pybuilds/build_ios.py --version "$VERSION" --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" --output dist

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name:     ${{ inputs.tag }}
          target_commitish: ${{ inputs.source_sha || github.sha }}
          files:    dist/${{ inputs.app_name || 'PiliSuper' }}_ios_*.ipa

      - uses: actions/upload-artifact@v7
        with:
          name: iOS
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_ios_*.ipa
          archive: false

  # ───────────── macOS ─────────────
  macos:
    name: macOS
    if: ${{ inputs.build_macos == true }}
    runs-on: macos-26
    permissions: write-all
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Add Rename CLI tool
        run: |
            dart pub global activate rename

      - name: Rename project
        run: |
          NAME_ARGS=()
          if [[ -n "${{ inputs.app_name}}" ]]; then
            NAME_ARGS+=(--app-name "${{ inputs.app_name}}")
          fi
          if [[ -n "${{ inputs.pkg_id }}" ]]; then
            NAME_ARGS+=(--pkg-id "${{ inputs.pkg_id }}")
          fi
          python3 pybuilds/rename.py "${NAME_ARGS[@]}"

      - name: Generate release metadata
        run: |
          python3 pybuilds/prebuild.py --platform macos
          echo "VERSION=$(sed -n 's/^version: //p' pubspec.yaml)" >> "$GITHUB_ENV"

      - name: Apply Patches
        run: python3 pybuilds/patch.py macos

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Build macOS archive
        run: python3 pybuilds/build_macos.py --version "$VERSION" --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" --output dist

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name:     ${{ inputs.tag }}
          target_commitish: ${{ inputs.source_sha || github.sha }}
          files: |
            dist/${{ inputs.app_name || 'PiliSuper' }}_macos_*.dmg
            dist/${{ inputs.app_name || 'PiliSuper' }}_macos_*.zip

      - uses: actions/upload-artifact@v7
        with:
          name: macOS
          path: |
            dist/${{ inputs.app_name || 'PiliSuper' }}_macos_*.dmg
            dist/${{ inputs.app_name || 'PiliSuper' }}_macos_*.zip
          archive: false

  # ───────────── Windows ─────────────
  windows:
    name: Windows x64
    if: ${{ inputs.build_windows_portable == true || inputs.build_windows_installer == true }}
    runs-on: windows-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Install fastforge and Inno Setup
        if: ${{ inputs.build_windows_installer == true }}
        shell: bash
        run: |
          dart pub global activate fastforge
          choco install innosetup --no-progress --yes

      - name: Add Inno Setup Chinese language
        if: ${{ inputs.build_windows_installer == true }}
        shell: pwsh
        run: |
          Copy-Item "windows/packaging/exe/ChineseSimplified.isl" `
            "C:\\Program Files (x86)\\Inno Setup 6\\Languages\\ChineseSimplified.isl"

      - name: Add Rename CLI tool
        run: |
            dart pub global activate rename

      - name: Rename project
        shell: bash
        run: |
          NAME_ARGS=()
          if [[ -n "${{ inputs.app_name}}" ]]; then
            NAME_ARGS+=(--app-name "${{ inputs.app_name}}")
          fi
          if [[ -n "${{ inputs.pkg_id }}" ]]; then
            NAME_ARGS+=(--pkg-id "${{ inputs.pkg_id }}")
          fi
          python pybuilds/rename.py "${NAME_ARGS[@]}"

      - name: Generate release metadata
        shell: bash
        run: |
          python pybuilds/prebuild.py --platform windows
          echo "VERSION=$(sed -n 's/^version: //p' pubspec.yaml)" >> "$GITHUB_ENV"

      - name: Apply Patches
        shell: bash
        run: python pybuilds/patch.py windows

      - name: Resolve Flutter dependencies
        shell: bash
        run: flutter pub get

      - name: Build portable Windows archive
        if: ${{ inputs.build_windows_portable == true }}
        shell: bash
        run: python pybuilds/build_windows.py --version "$VERSION" --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" --output dist

      - name: Build Windows installer
        if: ${{ inputs.build_windows_installer == true }}
        shell: bash
        run: python pybuilds/build_windows.py --installer --version "$VERSION" --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" --output dist

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name:     ${{ inputs.tag }}
          target_commitish: ${{ inputs.source_sha || github.sha }}
          files: |
            dist/${{ inputs.app_name || 'PiliSuper' }}_windows_*_portable.zip
            dist/${{ inputs.app_name || 'PiliSuper' }}_windows_*_setup.exe

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_windows_portable == true }}
        with:
          name: Windows_portable_x64
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_windows_*_portable.zip
          archive: false

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_windows_installer == true }}
        with:
          name: Windows_setup_x64
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_windows_*_setup.exe
          archive: false


  # ───────────── Linux ─────────────
  linux:
    name: Linux x64
    if: ${{ inputs.build_linux_tar_gz == true || inputs.build_linux_deb == true || inputs.build_linux_rpm == true || inputs.build_linux_appimage == true || inputs.build_linux_arch == true }}
    runs-on: ubuntu-latest
    permissions: write-all
    outputs:
      version: ${{ steps.release_metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libayatana-appindicator3-dev \
            libasound2-dev libmpv-dev \
            rpm patchelf webkit2gtk-4.1 \
            gcc g++ autoconf automake debhelper \
            glslang-dev ladspa-sdk xutils-dev \
            libarchive-dev libbluray-dev libbs2b-dev libcaca-dev \
            libcdio-paranoia-dev libdrm-dev libdav1d-dev libdvdnav-dev \
            libegl1-mesa-dev libepoxy-dev libfontconfig-dev libfreetype6-dev \
            libfribidi-dev libgl1-mesa-dev libgbm-dev libgme-dev libgsm1-dev \
            libharfbuzz-dev libjpeg-dev libbrotli-dev liblcms2-dev \
            libmodplug-dev libmp3lame-dev libopenal-dev libopus-dev \
            libopencore-amrnb-dev libopencore-amrwb-dev libpulse-dev \
            librtmp-dev libsdl2-dev libsixel-dev libssh-dev libsoxr-dev \
            libspeex-dev libtool libv4l-dev libva-dev libvdpau-dev \
            libvorbis-dev libvo-amrwbenc-dev libunwind-dev libvpx-dev \
            libwayland-dev libx11-dev libxext-dev libxkbcommon-dev \
            libxrandr-dev libxss-dev libxv-dev libxvidcore-dev \
            linux-libc-dev nasm wayland-protocols python3-docutils \
            x11proto-core-dev zlib1g-dev libfdk-aac-dev libtheora-dev \
            libwebp-dev unixodbc-dev libpq-dev libxxhash-dev libaom-dev \
            libgtk-3-0 libblkid1 liblzma5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Add Rename CLI tool
        run: |
            dart pub global activate rename

      - name: Rename project
        run: |
          NAME_ARGS=()
          if [[ -n "${{ inputs.app_name}}" ]]; then
            NAME_ARGS+=(--app-name "${{ inputs.app_name}}")
          fi
          if [[ -n "${{ inputs.pkg_id }}" ]]; then
            NAME_ARGS+=(--pkg-id "${{ inputs.pkg_id }}")
          fi
          python3 pybuilds/rename.py "${NAME_ARGS[@]}"

      - name: Generate release metadata
        id: release_metadata
        run: |
          python3 pybuilds/prebuild.py --platform linux
          VERSION=$(sed -n 's/^version: //p' pubspec.yaml)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Apply Patches
        run: python3 pybuilds/patch.py linux

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Build Linux bundle
        run: python3 pybuilds/build_linux.py

      - name: Package Linux tar.gz
        if: ${{ inputs.build_linux_tar_gz == true || inputs.build_linux_arch == true }}
        run: python3 pybuilds/packaging.py --version "$VERSION" --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" --app-name "${{ inputs.app_name || 'PiliSuper' }}" --pkg-id "${{ inputs.pkg_id || 'com.pili.super' }}" --output dist tar.gz

      - name: Package Linux DEB
        if: ${{ inputs.build_linux_deb == true }}
        run: python3 pybuilds/packaging.py --version "$VERSION" --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" --app-name "${{ inputs.app_name || 'PiliSuper' }}" --pkg-id "${{ inputs.pkg_id || 'com.pili.super' }}" --output dist deb

      - name: Package Linux RPM
        if: ${{ inputs.build_linux_rpm == true }}
        run: python3 pybuilds/packaging.py --version "$VERSION" --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" --app-name "${{ inputs.app_name || 'PiliSuper' }}" --pkg-id "${{ inputs.pkg_id || 'com.pili.super' }}" --output dist rpm

      - name: Package Linux AppImage
        if: ${{ inputs.build_linux_appimage == true }}
        run: python3 pybuilds/packaging.py --version "$VERSION" --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" --app-name "${{ inputs.app_name || 'PiliSuper' }}" --pkg-id "${{ inputs.pkg_id || 'com.pili.super' }}" --output dist appimage

      - name: Upload Linux bundle for Arch packaging
        if: ${{ inputs.build_linux_arch == true }}
        uses: actions/upload-artifact@v7
        with:
          name: Linux_bundle_x64
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_linux_*.tar.gz

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name:     ${{ inputs.tag }}
          target_commitish: ${{ inputs.source_sha || github.sha }}
          files: dist/${{ inputs.app_name || 'PiliSuper' }}_linux_*

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_linux_tar_gz == true }}
        with:
          name: Linux_tar.gz_amd64
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_linux_*.tar.gz
          archive: false

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_linux_deb == true }}
        with:
          name: Linux_deb_amd64
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_linux_*.deb
          archive: false

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_linux_rpm == true }}
        with:
          name: Linux_rpm_x86_64
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_linux_*.rpm
          archive: false

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.build_linux_appimage == true }}
        with:
          name: Linux_AppImage_x86_64
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_linux_*.AppImage
          archive: false

  arch:
    name: Arch Linux x64
    if: ${{ inputs.build_linux_arch == true }}
    needs: linux
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    permissions: write-all
    steps:
      - name: Install job dependencies
        run: pacman -Syu --noconfirm git python zstd gtk3 mpv libayatana-appindicator

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Download Linux bundle
        uses: actions/download-artifact@v8
        with:
          name: Linux_bundle_x64
          path: arch-input

      - name: Extract Linux bundle
        run: |
          mkdir -p build/linux/x64/release/bundle
          tar -xzf arch-input/${{ inputs.app_name || 'PiliSuper' }}_linux_*.tar.gz \
            -C build/linux/x64/release/bundle

      - name: Create unprivileged package user
        run: |
          useradd --create-home builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build Arch package
        run: |
          runuser -u builder -- python3 pybuilds/packaging.py \
            --version "${{ needs.linux.outputs.version }}" \
            --output-prefix "${{ inputs.app_name || 'PiliSuper' }}" \
            --app-name "${{ inputs.app_name || 'PiliSuper' }}" \
            --pkg-id "${{ inputs.pkg_id || 'com.pili.super' }}" \
            --output dist \
            arch

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          target_commitish: ${{ inputs.source_sha || github.sha }}
          files: dist/${{ inputs.app_name || 'PiliSuper' }}_linux_*.pkg.tar.zst

      - uses: actions/upload-artifact@v7
        with:
          name: Linux_arch_x86_64
          path: dist/${{ inputs.app_name || 'PiliSuper' }}_linux_*.pkg.tar.zst
          archive: false

  notify-telegram:
    name: Notify Telegram
    if: ${{ always() && github.event_name != 'pull_request' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    needs: [android, ios, macos, windows, linux, arch]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: notify-output

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          SOURCE_SHA: ${{ inputs.source_sha || github.sha }}
        shell: bash
        run: |
          if ! python3 pybuilds/notify_telegram.py \
            --output notify-output \
            --label "PiliSuper CI 构建产物 - ${{ github.ref_name }}"; then
            echo "::warning title=Telegram notification::构建产物 Telegram 通知发送失败，请查看日志。"
          fi
