name: Build

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag（留空则只构建不发布）"
        required: false
        default: ""
        type: string
      pkg_id:
        description: "包名（留空则使用默认值）"
        required: false
        default: "com.pili.super"
        type: string
      app_name:
        description: "应用名（留空则使用默认值）"
        required: false
        default: "PiliSuper"
        type: string
      build_android:
        description: "Build Android"
        default: true
        type: boolean
      build_android_dev:
        description: "Build Android Dev version"
        default: true
        type: boolean
      build_ios:
        description: "Build iOS"
        default: true
        type: boolean
      build_macos:
        description: "Build macOS"
        default: true
        type: boolean
      build_windows:
        description: "Build Windows"
        default: true
        type: boolean
      build_linux:
        description: "Build Linux"
        default: true
        type: boolean

# ─────────────────────────────────────────────────────────────────

jobs:

  # ───────────── Android ─────────────
  android:
    name: Android
    if: ${{ github.event_name == 'pull_request' || inputs.build_android == true }}
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Add Rename CLI tool
        run: |
            dart pub global activate rename

      - name: Rename project
        run: |
          NAME_ARGS=()
          if [[ -n "${{ inputs.app_name }}" ]]; then
            NAME_ARGS+=(--app-name "${{ inputs.app_name }}")
          fi
          if [[ -n "${{ inputs.pkg_id }}" ]]; then
            NAME_ARGS+=(--pkg-id "${{ inputs.pkg_id }}")
          fi
          python3 rename.py "${NAME_ARGS[@]}"

      - name: Generate release metadata
        run: |
          python3 prebuild.py --platform android
          echo "VERSION=$(sed -n 's/^version: //p' pubspec.yaml)" >> "$GITHUB_ENV"

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Apply Patches
        run: python3 patch.py android

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Build release APKs
        env:
          KEYSTORE_B64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          KEY_ALIAS:    ${{ secrets.KEY_ALIAS }}
          KEY_PASS:     ${{ secrets.KEY_PASSWORD }}
          STORE_PASS:   ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          SIGN_ARGS=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "$KEYSTORE_B64" ]]; then
            SIGN_ARGS=(
              --keystore-base64 "$KEYSTORE_B64"
              --key-alias "$KEY_ALIAS"
              --key-password "$KEY_PASS"
              --store-password "$STORE_PASS"
              --clean-keys
            )
          fi
          python3 build_android.py --version "$VERSION" --output-prefix PiliSuper --output dist "${SIGN_ARGS[@]}"

      - name: Build Dev
        env:
          KEYSTORE_B64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          KEY_ALIAS:    ${{ secrets.KEY_ALIAS }}
          KEY_PASS:     ${{ secrets.KEY_PASSWORD }}
          STORE_PASS:   ${{ secrets.KEYSTORE_PASSWORD }}
        if: ${{ github.event_name == 'pull_request' || inputs.build_android_dev == true }}
        run: |
          SIGN_ARGS=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "$KEYSTORE_B64" ]]; then
            SIGN_ARGS+=(
              --keystore-base64 "$KEYSTORE_B64"
              --key-alias       "$KEY_ALIAS"
              --key-password    "$KEY_PASS"
              --store-password  "$STORE_PASS"
              --clean-keys
            )
          fi

          VERSION=$(sed -n 's/^version: //p' pubspec.yaml)
          python3 build_android.py --version "$VERSION" --output-prefix PiliSuper --output dist --dev "${SIGN_ARGS[@]}"

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name:     ${{ inputs.tag }}
          files: |
            dist/PiliSuper_android_*_arm64-v8a.apk
            dist/PiliSuper_android_*_armeabi-v7a.apk
            dist/PiliSuper_android_*_x86_64.apk

      - uses: actions/upload-artifact@v7
        with:
          name: Android_arm64-v8a
          path: dist/PiliSuper_android_*_arm64-v8a.apk
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          name: Android_armeabi-v7a
          path: dist/PiliSuper_android_*_armeabi-v7a.apk
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          name: Android_x86_64
          path: dist/PiliSuper_android_*_x86_64.apk
          archive: false
      
      - uses: actions/upload-artifact@v7
        with:
          name: Android_arm64-v8a
          path: dist/PiliSuper_android_*_arm64-v8a_dev.apk
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          name: Android_armeabi-v7a
          path: dist/PiliSuper_android_*_armeabi-v7a_dev.apk
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          name: Android_x86_64
          path: dist/PiliSuper_android_*_x86_64_dev.apk
          archive: false

  # ───────────── iOS ─────────────
  ios:
    name: iOS
    if: ${{ github.event_name == 'pull_request' || inputs.build_ios == true }}
    runs-on: macos-26
    permissions: write-all
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      
      - name: Add Rename CLI tool
        run: |
            dart pub global activate rename

      - name: Rename project
        run: |
          NAME_ARGS=()
          if [[ -n "${{ inputs.app_name }}" ]]; then
            NAME_ARGS+=(--app-name "${{ inputs.app_name }}")
          fi
          if [[ -n "${{ inputs.pkg_id }}" ]]; then
            NAME_ARGS+=(--pkg-id "${{ inputs.pkg_id }}")
          fi
          python3 rename.py "${NAME_ARGS[@]}"

      - name: Generate release metadata
        run: |
          python3 prebuild.py --platform ios
          echo "VERSION=$(sed -n 's/^version: //p' pubspec.yaml)" >> "$GITHUB_ENV"

      - name: Apply Patches
        run: python3 patch.py ios

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Build IPA
        run: python3 build_ios.py --version "$VERSION" --output-prefix PiliSuper --output dist

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name:     ${{ inputs.tag }}
          files:    dist/PiliSuper_ios_*.ipa

      - uses: actions/upload-artifact@v7
        with:
          name: iOS
          path: dist/PiliSuper_ios_*.ipa
          archive: false

  # ───────────── macOS ─────────────
  macos:
    name: macOS
    if: ${{ github.event_name == 'pull_request' || inputs.build_macos == true }}
    runs-on: macos-26
    permissions: write-all
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Add Rename CLI tool
        run: |
            dart pub global activate rename

      - name: Rename project
        run: |
          NAME_ARGS=()
          if [[ -n "${{ inputs.app_name }}" ]]; then
            NAME_ARGS+=(--app-name "${{ inputs.app_name }}")
          fi
          if [[ -n "${{ inputs.pkg_id }}" ]]; then
            NAME_ARGS+=(--pkg-id "${{ inputs.pkg_id }}")
          fi
          python3 rename.py "${NAME_ARGS[@]}"

      - name: Generate release metadata
        run: |
          python3 prebuild.py --platform macos
          echo "VERSION=$(sed -n 's/^version: //p' pubspec.yaml)" >> "$GITHUB_ENV"

      - name: Apply Patches
        run: python3 patch.py macos

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Build macOS archive
        run: python3 build_macos.py --version "$VERSION" --output-prefix PiliSuper --output dist

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name:     ${{ inputs.tag }}
          files:    dist/PiliSuper_macos_*.dmg

      - uses: actions/upload-artifact@v7
        with:
          name: macOS
          path: dist/PiliSuper_macos_*.dmg
          archive: false

  # ───────────── Windows ─────────────
  windows:
    name: Windows x64
    if: ${{ github.event_name == 'pull_request' || inputs.build_windows == true }}
    runs-on: windows-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Add Rename CLI tool
        run: |
            dart pub global activate rename

      - name: Rename project
        shell: bash
        run: |
          NAME_ARGS=()
          if [[ -n "${{ inputs.app_name }}" ]]; then
            NAME_ARGS+=(--app-name "${{ inputs.app_name }}")
          fi
          if [[ -n "${{ inputs.pkg_id }}" ]]; then
            NAME_ARGS+=(--pkg-id "${{ inputs.pkg_id }}")
          fi
          python rename.py "${NAME_ARGS[@]}"

      - name: Generate release metadata
        shell: bash
        run: |
          python prebuild.py --platform windows
          echo "VERSION=$(sed -n 's/^version: //p' pubspec.yaml)" >> "$GITHUB_ENV"

      - name: Apply Patches
        shell: bash
        run: python patch.py windows

      - name: Resolve Flutter dependencies
        shell: bash
        run: flutter pub get

      - name: Build portable Windows archive
        shell: bash
        run: python build_windows.py --version "$VERSION" --output-prefix PiliSuper --output dist

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name:     ${{ inputs.tag }}
          files: |
            dist/PiliSuper_windows_*_portable.zip

      - uses: actions/upload-artifact@v7
        with:
          name: Windows_portable_x64
          path: dist/PiliSuper_windows_*_portable.zip
          archive: false


  # ───────────── Linux ─────────────
  linux:
    name: Linux x64
    if: ${{ github.event_name == 'pull_request' || inputs.build_linux == true }}
    runs-on: ubuntu-latest
    permissions: write-all
    outputs:
      version: ${{ steps.release_metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libayatana-appindicator3-dev \
            libasound2-dev libmpv-dev \
            rpm patchelf webkit2gtk-4.1 \
            gcc g++ autoconf automake debhelper \
            glslang-dev ladspa-sdk xutils-dev \
            libarchive-dev libbluray-dev libbs2b-dev libcaca-dev \
            libcdio-paranoia-dev libdrm-dev libdav1d-dev libdvdnav-dev \
            libegl1-mesa-dev libepoxy-dev libfontconfig-dev libfreetype6-dev \
            libfribidi-dev libgl1-mesa-dev libgbm-dev libgme-dev libgsm1-dev \
            libharfbuzz-dev libjpeg-dev libbrotli-dev liblcms2-dev \
            libmodplug-dev libmp3lame-dev libopenal-dev libopus-dev \
            libopencore-amrnb-dev libopencore-amrwb-dev libpulse-dev \
            librtmp-dev libsdl2-dev libsixel-dev libssh-dev libsoxr-dev \
            libspeex-dev libtool libv4l-dev libva-dev libvdpau-dev \
            libvorbis-dev libvo-amrwbenc-dev libunwind-dev libvpx-dev \
            libwayland-dev libx11-dev libxext-dev libxkbcommon-dev \
            libxrandr-dev libxss-dev libxv-dev libxvidcore-dev \
            linux-libc-dev nasm wayland-protocols python3-docutils \
            x11proto-core-dev zlib1g-dev libfdk-aac-dev libtheora-dev \
            libwebp-dev unixodbc-dev libpq-dev libxxhash-dev libaom-dev \
            libgtk-3-0 libblkid1 liblzma5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Add Rename CLI tool
        run: |
            dart pub global activate rename

      - name: Rename project
        run: |
          NAME_ARGS=()
          if [[ -n "${{ inputs.app_name }}" ]]; then
            NAME_ARGS+=(--app-name "${{ inputs.app_name }}")
          fi
          if [[ -n "${{ inputs.pkg_id }}" ]]; then
            NAME_ARGS+=(--pkg-id "${{ inputs.pkg_id }}")
          fi
          python3 rename.py "${NAME_ARGS[@]}"

      - name: Generate release metadata
        id: release_metadata
        run: |
          python3 prebuild.py --platform linux
          VERSION=$(sed -n 's/^version: //p' pubspec.yaml)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Apply Patches
        run: python3 patch.py linux

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Build Linux bundle
        run: python3 build_linux.py

      - name: Package Linux artifacts
        run: python3 packaging.py --version "$VERSION" --output-prefix PiliSuper --output dist tar.gz deb rpm

      - name: Upload Linux bundle for Arch packaging
        uses: actions/upload-artifact@v7
        with:
          name: Linux_bundle_x64
          path: dist/PiliSuper_linux_*.tar.gz

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name:     ${{ inputs.tag }}
          files: |
            dist/PiliSuper_linux_*.tar.gz
            dist/PiliSuper_linux_*.deb
            dist/PiliSuper_linux_*.rpm

      - uses: actions/upload-artifact@v7
        with:
          name: Linux_tar.gz_amd64
          path: dist/PiliSuper_linux_*.tar.gz
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          name: Linux_deb_amd64
          path: dist/PiliSuper_linux_*.deb
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          name: Linux_rpm_x86_64
          path: dist/PiliSuper_linux_*.rpm
          archive: false

  arch:
    name: Arch Linux x64
    needs: linux
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    permissions: write-all
    steps:
      - name: Install job dependencies
        run: pacman -Syu --noconfirm git python zstd

      - uses: actions/checkout@v6

      - name: Download Linux bundle
        uses: actions/download-artifact@v8
        with:
          name: Linux_bundle_x64
          path: arch-input

      - name: Extract Linux bundle
        run: |
          mkdir -p build/linux/x64/release/bundle
          tar -xzf arch-input/PiliSuper_linux_*.tar.gz \
            -C build/linux/x64/release/bundle

      - name: Create unprivileged package user
        run: |
          useradd --create-home builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build Arch package
        run: |
          runuser -u builder -- python3 packaging.py \
            --version "${{ needs.linux.outputs.version }}" \
            --output-prefix PiliSuper \
            --output dist \
            arch

      - name: Release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: dist/PiliSuper_linux_*.pkg.tar.zst

      - uses: actions/upload-artifact@v7
        with:
          name: Linux_arch_x86_64
          path: dist/PiliSuper_linux_*.pkg.tar.zst
          archive: false
