name: Periodic Full Build

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: "触发此次完整构建的 commit SHA（由 CI Check 自动填写）"
        required: false
        default: ""
        type: string

concurrency:
  group: periodic-full-build-${{ github.ref }}
  cancel-in-progress: false

permissions: write-all

jobs:
  build:
    name: Full distributable build
    uses: ./.github/workflows/build.yml
    with:
      build_android_release: true
      build_android_dev: true
      build_ios: true
      build_macos: true
      build_windows_portable: true
      build_windows_installer: true
      build_linux_tar_gz: true
      build_linux_deb: true
      build_linux_rpm: true
      build_linux_appimage: true
      build_linux_arch: true
