name: CI Check

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**.md"

concurrency:
  group: ci-check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 每累计十个仓库提交触发一次完整构建。
env:
  FULL_BUILD_COMMIT_INTERVAL: "10"

jobs:
  check:
    name: Flutter checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        if: ${{ hashFiles('test/**/*.dart') != '' }}
        run: flutter test

  # PR：每次提交在检查通过后立即跑完整多平台构建
  pr-full-build:
    name: PR full build
    if: ${{ github.event_name == 'pull_request' }}
    needs: check
    permissions: write-all
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      source_sha: ${{ github.sha }}
      build_android_release: true
      build_android_dev: true
      build_ios: true
      build_macos: true
      build_windows_portable: true
      build_windows_installer: true
      build_linux_tar_gz: true
      build_linux_deb: true
      build_linux_rpm: true
      build_linux_appimage: true
      build_linux_arch: true

  commit-threshold:
    name: Check full-build interval
    if: ${{ github.event_name == 'push' }}
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run: ${{ steps.threshold.outputs.run }}
      reason: ${{ steps.threshold.outputs.reason }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit interval
        id: threshold
        env:
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          commits="$(git rev-list --count "$SHA")"
          remainder=$((commits % FULL_BUILD_COMMIT_INTERVAL))
          if (( remainder == 0 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "reason=仓库累计 ${commits} 个提交，达到每 ${FULL_BUILD_COMMIT_INTERVAL} 个提交的间隔" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=仓库累计 ${commits} 个提交，距离下次完整构建还差 $((FULL_BUILD_COMMIT_INTERVAL - remainder)) 个提交" >> "$GITHUB_OUTPUT"
          fi

  periodic-full-build:
    name: Periodic full build
    if: ${{ always() && github.event_name == 'push' && needs.check.result == 'success' && needs.commit-threshold.result == 'success' && needs.commit-threshold.outputs.run == 'true' }}
    needs: [check, commit-threshold]
    permissions: write-all
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      source_sha: ${{ github.sha }}
      build_android_release: true
      build_android_dev: true
      build_ios: true
      build_macos: true
      build_windows_portable: true
      build_windows_installer: true
      build_linux_tar_gz: true
      build_linux_deb: true
      build_linux_rpm: true
      build_linux_appimage: true
      build_linux_arch: true
