name: CI Check

on:
  push:
    branches: [main, dev]

concurrency:
  group: ci-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Flutter checks
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        if: ${{ hashFiles('test/**/*.dart') != '' }}
        run: flutter test

  schedule-full-build:
    name: Schedule periodic full build
    needs: check
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check full-build threshold
        id: threshold
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          completed_full_runs="repos/${GITHUB_REPOSITORY}/actions/workflows/full-build.yml/runs?branch=${BRANCH}&status=completed&per_page=100"
          all_full_runs="repos/${GITHUB_REPOSITORY}/actions/workflows/full-build.yml/runs?branch=${BRANCH}&per_page=100"
          check_runs="repos/${GITHUB_REPOSITORY}/actions/workflows/ci-check.yml/runs?branch=${BRANCH}&event=push&per_page=100"
          last_full_sha="$(gh api --paginate "$completed_full_runs" --jq '.workflow_runs[] | select(.conclusion == "success") | .head_sha' | head -n 1 || true)"
          last_full_time="$(gh api --paginate "$completed_full_runs" --jq '.workflow_runs[] | select(.conclusion == "success") | .created_at' | head -n 1 || true)"

          if [[ -n "$last_full_sha" ]]; then
            base_sha="$last_full_sha"
            pushes="$(gh api --paginate "$check_runs" --jq --arg after "$last_full_time" '[.workflow_runs[] | select(.created_at > $after)] | length' | awk '{ total += $1 } END { print total + 0 }')"
          else
            # 首次启用时从第一轮 CI Check 开始计数，而不是立即构建整个历史。
            base_sha="$(gh api --paginate "$check_runs" --jq '.workflow_runs[] | .head_sha' | tail -n 1)"
            pushes="$(gh api --paginate "$check_runs" --jq '.workflow_runs[] | .id' | awk 'NF { total += 1 } END { print total + 0 }')"
          fi

          commits="$(git rev-list --count "${base_sha}..${SHA}")"
          active_full="$(gh api --paginate "$all_full_runs" --jq --arg after "$last_full_time" '[.workflow_runs[] | select((.status == "queued" or .status == "in_progress") and ($after == "" or .created_at > $after))] | length' | awk '{ total += $1 } END { print total + 0 }')"

          echo "commits_since_full=${commits}" >> "$GITHUB_OUTPUT"
          echo "pushes_since_full=${pushes}" >> "$GITHUB_OUTPUT"
          if (( active_full > 0 )); then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=已有完整构建正在排队或运行" >> "$GITHUB_OUTPUT"
          elif (( commits >= 15 || pushes >= 5 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "reason=${commits} 个提交 / ${pushes} 次 push" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=${commits} 个提交 / ${pushes} 次 push，未达到阈值" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch full build
        if: steps.threshold.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/full-build.yml/dispatches" \
            -f ref="$BRANCH" \
            -f "inputs[source_sha]=$SHA"
          echo "完整构建已排队：${{ steps.threshold.outputs.reason }}"

      - name: Report threshold status
        run: |
          echo "${{ steps.threshold.outputs.reason }}"
