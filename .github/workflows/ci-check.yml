name: CI Check

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**.md"

concurrency:
  group: ci-check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 仓库提交总数到达十的倍数，或距离上一次成功的完整构建至少四个提交时，触发完整构建。
env:
  FULL_BUILD_COMMIT_INTERVAL: "10"
  FULL_BUILD_COMMIT_FALLBACK_INTERVAL: "4"

jobs:
  check:
    name: Flutter checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Verify formatting
        shell: bash
        run: |
          if ! dart format --set-exit-if-changed .; then
            echo "::warning title=Formatting::代码未通过 dart format；请运行 dart format ."
          fi

      - name: Analyze
        shell: bash
        run: |
          if ! flutter analyze; then
            echo "::warning title=Static analysis::flutter analyze 发现诊断，请查看日志。"
          fi

      - name: Test
        if: ${{ hashFiles('test/**/*.dart') != '' }}
        run: flutter test

      - name: Test Python build scripts
        run: python3 -m unittest discover -s pybuilds/tests -v

  # PR：每次提交在检查通过后立即跑完整多平台构建
  pr-full-build:
    name: PR full build
    if: ${{ github.event_name == 'pull_request' }}
    needs: check
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      source_sha: ${{ github.sha }}
      sign_android: false
      build_android_release: true
      build_android_dev: true
      build_ios: true
      build_macos: true
      build_windows_portable: true
      build_windows_installer: true
      build_linux_tar_gz: true
      build_linux_deb: true
      build_linux_rpm: true
      build_linux_appimage: true
      build_linux_arch: true

  commit-threshold:
    name: Check full-build interval
    if: ${{ github.event_name == 'push' }}
    needs: check
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      run: ${{ steps.threshold.outputs.run }}
      reason: ${{ steps.threshold.outputs.reason }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit interval
        id: threshold
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          commits="$(git rev-list --count "$SHA")"
          remainder=$((commits % FULL_BUILD_COMMIT_INTERVAL))

          last_full_sha=""
          while read -r run_id run_sha; do
            [[ -z "$run_id" ]] && continue
            successful_full_build="$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
              --jq '[.jobs[] | select(.name | startswith("Periodic full build")) | select(.conclusion == "success")] | length')"
            if [[ "$successful_full_build" != "0" ]]; then
              last_full_sha="$run_sha"
              break
            fi
          done < <(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/ci-check.yml/runs?branch=${GITHUB_REF_NAME}&event=push&status=completed&per_page=100" \
              --jq '.workflow_runs[] | select(.conclusion == "success") | [.id, .head_sha] | @tsv'
          )

          commits_since_last_full=0
          if [[ -z "$last_full_sha" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "reason=未找到成功的完整构建基线，执行首次完整构建" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git cat-file -e "$last_full_sha^{commit}" 2>/dev/null || ! git merge-base --is-ancestor "$last_full_sha" "$SHA"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "reason=上次完整构建基线不在当前分支历史中，执行完整构建" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -n "$last_full_sha" ]]; then
            commits_since_last_full="$(git rev-list --count "$last_full_sha..$SHA")"
          fi

          if (( remainder == 0 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "reason=仓库累计 ${commits} 个提交，是 ${FULL_BUILD_COMMIT_INTERVAL} 的倍数" >> "$GITHUB_OUTPUT"
          elif (( commits_since_last_full >= FULL_BUILD_COMMIT_FALLBACK_INTERVAL )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "reason=距离上一次成功完整构建已新增 ${commits_since_last_full} 个提交（阈值: ≥${FULL_BUILD_COMMIT_FALLBACK_INTERVAL}）" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=累计 ${commits} 个提交，距离上次成功完整构建新增 ${commits_since_last_full} 个提交" >> "$GITHUB_OUTPUT"
          fi

  periodic-full-build:
    name: Periodic full build
    if: ${{ always() && github.event_name == 'push' && needs.check.result == 'success' && needs.commit-threshold.result == 'success' && needs.commit-threshold.outputs.run == 'true' }}
    needs: [check, commit-threshold]
    permissions: write-all
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      source_sha: ${{ github.sha }}
      sign_android: true
      build_android_release: true
      build_android_dev: true
      build_ios: true
      build_macos: true
      build_windows_portable: true
      build_windows_installer: true
      build_linux_tar_gz: true
      build_linux_deb: true
      build_linux_rpm: true
      build_linux_appimage: true
      build_linux_arch: true
